<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>GeoScouting by Plano</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="app">
      <header class="brand">
        <div class="logo" aria-label="Plano logo">P</div>
        <div>
          <h1>GeoScouting by Plano</h1>
          <p>Encontrá leads locales en Google Maps</p>
        </div>
      </header>

      <section class="panel">
        <div id="message" class="message">Verificando pestaña activa...</div>

        <div class="controls">
          <input id="filenameInput" type="text" placeholder="Nombre de archivo (opcional)" />
        </div>

        <section id="progressContainer" class="progressWrap" style="display: none">
          <div id="progressText" class="progressText">Extrayendo leads... 0%</div>
          <div class="progressBar" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
            <div id="progressFill" class="progressFill"></div>
          </div>
        </section>

        <section id="statsContainer" class="stats" style="display: none">
          <div>Total: <strong id="totalLeads">0</strong></div>
          <div>Con teléfono: <strong id="withPhone">0</strong></div>
          <div>Con email: <strong id="withEmail">0</strong></div>
          <div>Con web: <strong id="withWeb">0</strong></div>
          <div>Con red social: <strong id="withSocial">0</strong></div>
          <div>Leads alto valor: <strong id="highValueLeads">0</strong></div>
          <div>Rating promedio: <strong id="avgRating">0</strong></div>
        </section>

        <section class="actions">
          <button id="actionButton" class="btn primary" disabled>Scrape Google Maps</button>
          <button id="downloadCsvButton" class="btn success" disabled>Descargar CSV</button>
          <button id="downloadJsonButton" class="btn" disabled>Descargar JSON</button>
        </section>
      </section>

      <section class="tableWrap">
        <table id="resultsTable"></table>
      </section>

      <footer class="footer">by planoweb.com.ar</footer>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
